<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Мониторинг — Фихтер Андрей</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#0F1117;color:#E8EAED;min-height:100vh;padding:14px;font-size:14px}
.topbar{display:flex;justify-content:space-between;align-items:center;background:#1A1D27;border-radius:12px;border:1px solid #2A2D3A;padding:12px 18px;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ttl{font-size:15px;font-weight:700;color:#fff}.ttl em{color:#4F8EF7;font-style:normal}
.sub{font-size:11px;color:#666;margin-top:2px}
.top-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge-auto{background:#1E3A2E;color:#34C98A;border:1px solid #34C98A44;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.btn-check{background:#2A2D3A;color:#E8EAED;border:1px solid #3A3D4A;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
.btn-check:hover{background:#3A3D4A}.btn-check:disabled{opacity:.4;cursor:not-allowed}
.last-upd{font-size:11px;color:#555;text-align:right;margin-top:2px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.sum-card{background:#1A1D27;border-radius:10px;border:1px solid #2A2D3A;padding:10px 14px}
.sum-college{font-size:11px;color:#888;margin-bottom:6px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sum-spec{display:flex;align-items:center;gap:6px;padding:2px 0}
.sum-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#34C98A}.dot-warn{background:#F5A623}.dot-bad{background:#F55044}.dot-unk{background:#444}
.sum-name{font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sum-pos{font-size:12px;font-weight:700;flex-shrink:0}
.sp-ok{color:#34C98A}.sp-warn{color:#F5A623}.sp-bad{color:#F55044}.sp-unk{color:#555}
.college{background:#1A1D27;border-radius:12px;border:1px solid #2A2D3A;overflow:hidden;margin-bottom:12px}
.college-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #2A2D3A;background:#12151F;gap:8px}
.college-name{font-size:13px;font-weight:700;color:#fff}
.college-site{font-size:11px;color:#555;margin-top:1px}
.vuz-yes{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;background:#1A2D4A;color:#4F8EF7;border:1px solid #4F8EF744}
.vuz-no{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;background:#1E1E2A;color:#666;border:1px solid #2A2D3A}
.specs-grid{display:grid;grid-template-columns:1fr 1fr}
.spec{padding:12px 16px;border-right:1px solid #2A2D3A}
.spec:last-child{border-right:none}
.spec-tag{font-size:10px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.spec-name{font-size:11px;color:#888;margin-bottom:8px;line-height:1.4}
.score-b{margin-left:auto;font-size:10px;background:#1A2D4A;color:#4F8EF7;border:1px solid #4F8EF733;padding:1px 6px;border-radius:8px}
.pos-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.pos-num{font-size:2.4rem;font-weight:800;line-height:1}
.n-ok{color:#34C98A}.n-warn{color:#F5A623}.n-bad{color:#F55044}.n-unk{color:#666}
.delta{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px}
.d-ok{background:#34C98A18;color:#34C98A}.d-bad{background:#F5504418;color:#F55044}.d-eq{background:#88888818;color:#888}
.pos-of{font-size:12px;color:#555}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:7px}
.pill-ok{background:#34C98A15;color:#34C98A;border:1px solid #34C98A33}
.pill-warn{background:#F5A62315;color:#F5A623;border:1px solid #F5A62333}
.pill-bad{background:#F5504415;color:#F55044;border:1px solid #F5504433}
.pill-unk{background:#88888812;color:#666;border:1px solid #2A2D3A}
.track{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-bottom:3px}
.t-ok{background:#34C98A55}.t-warn{background:#F5A62355}.t-bad{background:#F5504422;flex:1}
.track-lbl{display:flex;justify-content:space-between;font-size:10px;color:#444;margin-bottom:8px}
.no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:110px;gap:5px;padding:12px 16px;border-right:1px solid #2A2D3A}
.no-data:last-child{border-right:none}
.no-data-tag{font-size:10px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;align-self:flex-start}
.nd-icon{font-size:22px;color:#333}
.nd-txt{font-size:11px;color:#555;text-align:center;line-height:1.5}
.hist{border-top:1px solid #2A2D3A}
.hist-title{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em;padding:7px 16px 4px}
.hist-scroll{max-height:116px;overflow-y:auto}
.hist-scroll::-webkit-scrollbar{width:4px}
.hist-scroll::-webkit-scrollbar-track{background:#12151F}
.hist-scroll::-webkit-scrollbar-thumb{background:#2A2D3A;border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{color:#444;font-weight:600;padding:3px 16px;text-align:left;border-bottom:1px solid #1E2130;position:sticky;top:0;background:#12151F}
td{padding:4px 16px;border-bottom:1px solid #1A1D27;color:#888}
.h-ok{color:#34C98A;font-weight:700}.h-warn{color:#F5A623;font-weight:700}
.h-bad{color:#F55044;font-weight:700}.h-unk{color:#555}.h-time{color:#666}
.no-hist{padding:12px 16px;font-size:11px;color:#444;text-align:center}
.chart-block{background:#1A1D27;border-radius:12px;border:1px solid #2A2D3A;padding:14px 18px;margin-bottom:12px}
.chart-ttl{font-size:12px;font-weight:700;color:#aaa;margin-bottom:12px}
.chart-hint{color:#444;font-size:12px;text-align:center;padding:24px 0}
canvas{max-height:200px}
.footer{text-align:center;font-size:11px;color:#333;padding:6px}
.loading{text-align:center;padding:50px;color:#555}

@media(max-width:600px){
  body{padding:10px}
  .topbar{flex-direction:column;align-items:flex-start;gap:8px;padding:10px 14px}
  .top-r{width:100%;justify-content:space-between}
  .last-upd{text-align:left;margin-top:2px}
  .summary{grid-template-columns:repeat(3,minmax(140px,1fr));overflow-x:auto;
    padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .summary::-webkit-scrollbar{display:none}
  .sum-card{min-width:140px}
  .specs-grid{grid-template-columns:1fr}
  .spec{border-right:none;border-bottom:1px solid #2A2D3A;padding:10px 14px}
  .spec:last-child{border-bottom:none}
  .no-data{border-right:none;border-bottom:1px solid #2A2D3A}
  .no-data:last-child{border-bottom:none}
  .pos-num{font-size:2rem}
  th,td{padding:4px 12px}
  .college-hdr{flex-wrap:wrap;gap:4px}
}
</style>
</head>
<body>
<div id="app"><div class="loading">⏳ Загружаем данные...</div></div>
<script>
const COLLEGES=[
  {name:"КМРК при КГТУ",short:"КМРК",site:"klgtu.ru",vuz:"при КГТУ",
   specialties:[
    {name:"09.02.06 Сетевое и системное администрирование",label:"Сетевое",code:"09.02.06",budget:20,color:"#34C98A"},
    {name:"09.02.11 Разработка и управление ПО",label:"Разработка ПО",code:"09.02.11",budget:20,color:"#4F8EF7"},
  ]},
  {name:"КИТиС",short:"КИТиС",site:"kitis.ru",vuz:null,
   specialties:[
    {name:"09.02.06 Сетевое и системное администрирование",label:"Сетевое",code:"09.02.06",budget:50,color:"#34C98A"},
    {name:"08.02.01 Строительство и эксплуатация зданий",label:"Строительство",code:"08.02.01",budget:50,color:"#F5A623"},
  ]},
  {name:"Колледж при БФУ им. И. Канта",short:"БФУ",site:"kantiana.ru",vuz:"при БФУ",
   specialties:[
    {name:"09.02.11 Разработка и управление ПО",label:"Разработка ПО",code:"09.02.11",budget:25,color:"#4F8EF7"},
    {name:"08.02.01 Строительство и эксплуатация зданий",label:"Строительство",code:"08.02.01",budget:15,color:"#F5A623"},
  ]},
];
let chartInst=null;
function fmtTime(iso){if(!iso)return'—';const d=new Date(iso+(iso.endsWith('Z')?'':'Z'));return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtShort(iso){if(!iso)return'—';const d=new Date(iso+(iso.endsWith('Z')?'':'Z'));return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function getEntries(h,ci,si){return h.filter(e=>e.college_idx===ci&&e.spec_idx===si);}
function normalize(h){return h.map(e=>e.college_idx===undefined?{...e,college_idx:0}:e);}
function nc(pos,b){if(pos===null)return'n-unk';const p=parseInt(pos);if(isNaN(p))return'n-unk';if(p<=b)return'n-ok';if(p<=b+5)return'n-warn';return'n-bad';}
function pc(pos,b){if(pos===null)return'pill-unk';const p=parseInt(pos);if(isNaN(p))return'pill-unk';if(p<=b)return'pill-ok';if(p<=b+5)return'pill-warn';return'pill-bad';}
function pt(pos,b){if(pos===null)return'⏳ Ожидание';const p=parseInt(pos);if(isNaN(p))return'❓ Неизвестно';if(p<=b)return`✅ Место ${p} из ${b} бюджетных`;if(p<=b+5)return`⚡ ${p-b} до бюджета`;return`⏳ ${p-b} мест до бюджета`;}
function dc2(pos,b,hu){if(!hu||pos===null)return'dot-unk';const p=parseInt(pos);if(isNaN(p))return'dot-unk';if(p<=b)return'dot-ok';if(p<=b+5)return'dot-warn';return'dot-bad';}
function spc(pos,b,hu){if(!hu||pos===null)return'sp-unk';const p=parseInt(pos);if(isNaN(p))return'sp-unk';if(p<=b)return'sp-ok';if(p<=b+5)return'sp-warn';return'sp-bad';}
function dh(entries,pos){if(entries.length<2||pos===null)return'';const prev=entries[entries.length-2].position;if(prev===null)return'';try{const d=parseInt(prev)-parseInt(pos);if(d>0)return`<span class="delta d-ok">▼${d}</span>`;if(d<0)return`<span class="delta d-bad">▲${Math.abs(d)}</span>`;return`<span class="delta d-eq">=</span>`;}catch{return'';}}
function hc(pos,b){if(pos===null)return'h-unk';const p=parseInt(pos);if(isNaN(p))return'h-unk';if(p<=b)return'h-ok';if(p<=b+5)return'h-warn';return'h-bad';}

function render(rawH){
  const h=normalize(rawH);
  const lastEntry=h[h.length-1];
  const lastCheck=lastEntry?fmtTime(lastEntry.time):'—';
  const allLabels=[...new Set(h.map(e=>e.time.slice(0,16).replace('T',' ')))].sort();
  const chartDS=[];

  let sumHtml='';
  COLLEGES.forEach((col,ci)=>{
    let sh='';
    col.specialties.forEach((spec,si)=>{
      const entries=getEntries(h,ci,si);
      const last=entries[entries.length-1]||null;
      const pos=last?.position??null;
      const hu=entries.length>0;
      sh+=`<div class="sum-spec"><div class="sum-dot ${dc2(pos,spec.budget,hu)}"></div><span class="sum-name">${spec.label}</span><span class="sum-pos ${spc(pos,spec.budget,hu)}">${hu&&pos!==null?pos+'/'+spec.budget:'–'}</span></div>`;
    });
    sumHtml+=`<div class="sum-card"><div class="sum-college">${col.short}</div>${sh}</div>`;
  });

  let colHtml='';
  COLLEGES.forEach((col,ci)=>{
    const vuz=col.vuz?`<span class="vuz-yes">${col.vuz}</span>`:`<span class="vuz-no">самостоятельный</span>`;
    let specsH='';
    col.specialties.forEach((spec,si)=>{
      const entries=getEntries(h,ci,si);
      const last=entries[entries.length-1]||null;
      const pos=last?.position??null;
      const total=last?.total??'?';
      const score=last?.score??null;
      const hu=entries.length>0;
      if(!hu){
        specsH+=`<div class="no-data"><div class="no-data-tag">${spec.code} · ${spec.label}</div><div class="nd-icon">⏳</div><div class="nd-txt">Ожидаем рассмотрения<br>документов</div><div class="pill pill-unk" style="margin-top:4px">В рассмотрении</div></div>`;
        return;
      }
      const scoreH=score?`<span class="score-b">Балл: ${score.toFixed(2)}</span>`:'';
      let trackH='';
      const pI=pos?parseInt(pos):null;
      const tI=total&&!isNaN(total)?parseInt(total):null;
      if(pI&&tI&&tI>0){const b=spec.budget;const pB=(b/tI*100).toFixed(1);const pW=((b+5)/tI*100).toFixed(1);trackH=`<div class="track"><div class="t-ok" style="width:${pB}%"></div><div class="t-warn" style="width:${Math.max(0,pW-pB)}%"></div><div class="t-bad"></div></div><div class="track-lbl"><span>1</span><span>бюджет ${b}</span><span>${tI}</span></div>`;}
      specsH+=`<div class="spec"><div class="spec-tag">${spec.code} ${scoreH}</div><div class="spec-name">${spec.name}</div><div class="pos-row"><div class="pos-num ${nc(pos,spec.budget)}">${pos??'—'}</div>${dh(entries,pos)}<span class="pos-of">из ${total}</span></div><div class="pill ${pc(pos,spec.budget)}">${pt(pos,spec.budget)}</div>${trackH}</div>`;
      const lv={};entries.forEach(e=>{const v=parseInt(e.position);if(!isNaN(v))lv[e.time.slice(0,16).replace('T',' ')]=v;});
      chartDS.push({label:`${col.short}/${spec.label}`,data:allLabels.map(l=>lv[l]??null),borderColor:spec.color,borderWidth:2,pointRadius:4,stepped:'before',fill:false,spanGaps:false});
    });

    const tm={};
    col.specialties.forEach((_,si)=>{getEntries(h,ci,si).forEach(e=>{if(!tm[e.time])tm[e.time]={};tm[e.time][si]=e;});});
    const times=Object.keys(tm).sort().reverse();
    let rows='';
    times.forEach(t=>{
      const cells=col.specialties.map((spec,si)=>{const e=tm[t][si];if(!e)return'<td>—</td>';if(e.error)return'<td class="h-unk">Ошибка</td>';if(e.position===null)return'<td class="h-unk">—</td>';return`<td class="${hc(e.position,spec.budget)}">${e.position}</td>`;}).join('');
      rows+=`<tr><td class="h-time">${fmtShort(t)}</td>${cells}</tr>`;
    });
    const thCells=col.specialties.map(s=>`<th>${s.label}</th>`).join('');
    const histH=times.length>0?`<div class="hist-scroll"><table><thead><tr><th>Время</th>${thCells}</tr></thead><tbody>${rows}</tbody></table></div>`:`<div class="no-hist">Данных пока нет — появятся после первой успешной проверки</div>`;

    colHtml+=`<div class="college"><div class="college-hdr"><div><div class="college-name">${col.name}</div><div class="college-site">${col.site}</div></div>${vuz}</div><div class="specs-grid">${specsH}</div><div class="hist"><div class="hist-title">История проверок</div>${histH}</div></div>`;
  });

  const nPts=Math.max(0,...COLLEGES.map((_,ci)=>Math.max(0,...COLLEGES[ci].specialties.map((_,si)=>getEntries(h,ci,si).length))));
  const chartH=nPts>=3?`<canvas id="chart"></canvas>`:`<div class="chart-hint">График появится после 3 проверок (сейчас ${nPts})</div>`;

  document.getElementById('app').innerHTML=`
  <div class="topbar"><div><div class="ttl">📊 Мониторинг — <em>Фихтер Андрей</em></div><div class="sub">3 колледжа · 6 специальностей · Бюджет · Очная · 9 классов</div></div>
  <div class="top-r"><div class="badge-auto">🔄 Авто-проверка каждые 30 мин.</div><div><button class="btn-check" id="btn-check" onclick="triggerCheck()">▶ Проверить сейчас</button><div class="last-upd">Последняя: ${lastCheck}</div></div></div></div>
  <div class="summary">${sumHtml}</div>
  ${colHtml}
  <div class="chart-block"><div class="chart-ttl">📈 Динамика позиции</div>${chartH}</div>
  <div class="footer">Данные с <a href="https://abitur.klgtu.ru" target="_blank" style="color:#4F8EF7">abitur.klgtu.ru</a> &nbsp;·&nbsp; ${new Date().toLocaleString('ru-RU')}</div>`;

  if(nPts>=3){const ctx=document.getElementById('chart');if(chartInst)chartInst.destroy();chartInst=new Chart(ctx.getContext('2d'),{type:'line',data:{labels:allLabels,datasets:chartDS},options:{responsive:true,scales:{y:{reverse:true,grid:{color:'#2A2D3A'},ticks:{color:'#666'},title:{display:true,text:'Позиция (меньше = лучше)',color:'#555'}},x:{grid:{color:'#2A2D3A'},ticks:{color:'#666',maxTicksLimit:10,maxRotation:30}}},plugins:{legend:{labels:{color:'#aaa'}}}}});}
}

async function loadAndRender(){try{const r=await fetch('./data/history.json?t='+Date.now());render(await r.json());}catch{document.getElementById('app').innerHTML='<div class="loading">⚠️ Не удалось загрузить данные. Обновите страницу.</div>';}}

async function triggerCheck(){
  let token=localStorage.getItem('gh_token');
  if(!token){token=prompt('Введите GitHub токен (один раз):');if(!token)return;localStorage.setItem('gh_token',token);}
  const btn=document.getElementById('btn-check');btn.disabled=true;btn.textContent='⏳ Запускаю...';
  try{const r=await fetch('https://api.github.com/repos/fihtere-web/monitor/actions/workflows/monitor.yml/dispatches',{method:'POST',headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({ref:'main'})});
  if(r.status===204){btn.textContent='✅ Запущено! (~1 мин)';setTimeout(()=>{btn.textContent='▶ Проверить сейчас';btn.disabled=false;},90000);}
  else if(r.status===401){localStorage.removeItem('gh_token');btn.textContent='❌ Токен неверный';setTimeout(()=>{btn.textContent='▶ Проверить сейчас';btn.disabled=false;},3000);}
  else{btn.textContent='⚠️ Ошибка '+r.status;setTimeout(()=>{btn.textContent='▶ Проверить сейчас';btn.disabled=false;},3000);}}
  catch{btn.textContent='❌ Ошибка сети';setTimeout(()=>{btn.textContent='▶ Проверить сейчас';btn.disabled=false;},3000);}
}
loadAndRender();setInterval(loadAndRender,5*60*1000);
</script>
</body>
</html>
