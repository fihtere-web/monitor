name: Мониторинг КМРК КГТУ

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Проверка позиции
        run: python check.py

      - name: Сохранение результатов
        run: |
          git config user.name  "Monitor Bot"
          git config user.email "bot@github-monitor"
          git add data/history.json
          git diff --staged --quiet || git commit -m "check $(date '+%d.%m %H:%M')"
          git push
